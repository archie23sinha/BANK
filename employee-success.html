
<!DOCTYPE html>
<html>
<head>
    <title>Registration Success - ASP Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER/NAVIGATION -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-university"></i>
                    </div>
                    <div class="logo-text">
                        <span class="logo-main">ASP</span>
                        <span class="logo-sub">Bank</span>
                    </div>
                </div>

                <div class="nav-menu">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="customer-login.html" class="nav-link login-btn">Login</a>
                </div>

                <div class="mobile-menu-toggle">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </nav>
    </header>

    <!-- MOBILE MENU -->
    <div class="mobile-menu">
        <div class="mobile-menu-content">
            <a href="index.html" class="mobile-nav-link">Home</a>
            <a href="customer-login.html" class="mobile-nav-link login-btn">Login</a>
        </div>
    </div>

<div class="container">
    <h2 style="color:green;">Registration Successful ✅</h2>

    <p><b>ID:</b> <span id="id"></span></p>
    <p><b>Name:</b> <span id="name"></span></p>

    <button onclick="goDashboard()">Go to Dashboard</button>
</div>

<script>
let emp = JSON.parse(localStorage.getItem("employee"));

document.getElementById("id").innerText = emp.empId;
document.getElementById("name").innerText = emp.fname + " " + emp.lname;

function goDashboard(){
    window.location.href = "dashboard.html";
}

// Mobile menu toggle functionality
document.addEventListener('DOMContentLoaded', function() {
    const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
    const mobileMenu = document.querySelector('.mobile-menu');

    mobileMenuToggle.addEventListener('click', function() {
        mobileMenu.classList.toggle('active');
        const icon = mobileMenuToggle.querySelector('i');
        if (mobileMenu.classList.contains('active')) {
            icon.classList.remove('fa-bars');
            icon.classList.add('fa-times');
        } else {
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        }
    });

    // Close mobile menu when clicking on a link
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
        link.addEventListener('click', function() {
            mobileMenu.classList.remove('active');
            const icon = mobileMenuToggle.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        });
    });

    // Close mobile menu when clicking outside
    document.addEventListener('click', function(event) {
        if (!mobileMenuToggle.contains(event.target) && !mobileMenu.contains(event.target)) {
            mobileMenu.classList.remove('active');
            const icon = mobileMenuToggle.querySelector('i');
            icon.classList.remove('fa-times');
            icon.classList.add('fa-bars');
        }
    });
});
</script>

</body>
</html>
